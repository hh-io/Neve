# Neve Server Log Rotation Configuration
# Location: /etc/newsyslog.d/neve.conf (requires sudo to install)
#
# Install with: sudo cp neve.newsyslog.conf /etc/newsyslog.d/neve.conf
# Test with: sudo newsyslog -nv
#
# Fields: logfile, owner:group, mode, count, size, when, flags, pid_file
# count=7  - keep 7 rotated logs
# size=5120 - rotate when file exceeds 5MB (in KB)
# when=* - no time-based rotation (size-based only)
# J - compress with bzip2
# N - don't send signal (no pid file needed)

/Users/hh/Library/Logs/neve.log          hh:staff  644  7  5120  *  JN
/Users/hh/Library/Logs/neve.error.log    hh:staff  644  7  1024  *  JN

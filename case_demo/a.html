<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neve - 智能记账系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* glm */ 
            /* 亮色主题 - 低饱和度配色 */
            --primary-light: #8B9DC3;
            --primary-hover-light: #7A8DB5;
            --secondary-light: #DDD4C0;
            --accent-light: #A8B2C1;
            --success-light: #95B8A6;
            --danger-light: #C4A494;
            --warning-light: #D4B5A0;
            --bg-primary-light: #F8F7F4;
            --bg-secondary-light: #FFFFFF;
            --text-primary-light: #3A3A3A;
            --text-secondary-light: #6B6B6B;
            --border-light: #E5E5E5;
            --card-shadow-light: rgba(139, 157, 195, 0.1);
            
            /* 暗色主题 - 低饱和度配色 */
            --primary-dark: #6B7A99;
            --primary-hover-dark: #5A6A88;
            --secondary-dark: #4A4A4A;
            --accent-dark: #7A8493;
            --success-dark: #7A9687;
            --danger-dark: #9C8274;
            --warning-dark: #A8907F;
            --bg-primary-dark: #1A1A1A;
            --bg-secondary-dark: #252525;
            --text-primary-dark: #E0E0E0;
            --text-secondary-dark: #B0B0B0;
            --border-dark: #3A3A3A;
            --card-shadow-dark: rgba(107, 122, 153, 0.2);
        }

        [data-theme="light"] {
            --primary: var(--primary-light);
            --primary-hover: var(--primary-hover-light);
            --secondary: var(--secondary-light);
            --accent: var(--accent-light);
            --success: var(--success-light);
            --danger: var(--danger-light);
            --warning: var(--warning-light);
            --bg-primary: var(--bg-primary-light);
            --bg-secondary: var(--bg-secondary-light);
            --text-primary: var(--text-primary-light);
            --text-secondary: var(--text-secondary-light);
            --border: var(--border-light);
            --card-shadow: var(--card-shadow-light);
        }

        [data-theme="dark"] {
            --primary: var(--primary-dark);
            --primary-hover: var(--primary-hover-dark);
            --secondary: var(--secondary-dark);
            --accent: var(--accent-dark);
            --success: var(--success-dark);
            --danger: var(--danger-dark);
            --warning: var(--warning-dark);
            --bg-primary: var(--bg-primary-dark);
            --bg-secondary: var(--bg-secondary-dark);
            --text-primary: var(--text-primary-dark);
            --text-secondary: var(--text-secondary-dark);
            --border: var(--border-dark);
            --card-shadow: var(--card-shadow-dark);
        }

        * {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px var(--card-shadow);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 12px var(--card-shadow);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .theme-toggle {
            position: relative;
            width: 60px;
            height: 30px;
            background-color: var(--border);
            border-radius: 15px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .theme-toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background-color: var(--primary);
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        [data-theme="dark"] .theme-toggle-slider {
            transform: translateX(30px);
        }

        .transaction-item {
            transition: all 0.3s ease;
        }

        .transaction-item:hover {
            transform: translateX(5px);
            background-color: var(--card-shadow);
        }

        .chart-bar {
            animation: growBar 1s ease-out;
        }

        @keyframes growBar {
            from { height: 0; }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body data-theme="light" class="min-h-screen">
    <!-- Header -->
    <header class="card sticky top-0 z-50 px-6 py-4 mb-6 fade-in">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-wallet text-3xl" style="color: var(--primary);"></i>
                <h1 class="text-2xl font-bold">Neve</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="addTransactionBtn" class="btn-primary px-4 py-2 rounded-lg flex items-center space-x-2">
                    <i class="fas fa-plus"></i>
                    <span>添加记录</span>
                </button>
                <div class="flex items-center space-x-2">
                    <i class="fas fa-sun" style="color: var(--warning);"></i>
                    <div class="theme-toggle" onclick="toggleTheme()">
                        <div class="theme-toggle-slider"></div>
                    </div>
                    <i class="fas fa-moon" style="color: var(--accent);"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 pb-10">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="card p-6 rounded-xl fade-in" style="animation-delay: 0.1s;">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary);">本月收入</p>
                        <p class="text-2xl font-bold mt-1">¥12,580</p>
                    </div>
                    <i class="fas fa-arrow-up text-xl" style="color: var(--success);"></i>
                </div>
                <div class="text-xs" style="color: var(--success);">+12.5%</div>
            </div>

            <div class="card p-6 rounded-xl fade-in" style="animation-delay: 0.2s;">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary);">本月支出</p>
                        <p class="text-2xl font-bold mt-1">¥8,320</p>
                    </div>
                    <i class="fas fa-arrow-down text-xl" style="color: var(--danger);"></i>
                </div>
                <div class="text-xs" style="color: var(--danger);">-5.2%</div>
            </div>

            <div class="card p-6 rounded-xl fade-in" style="animation-delay: 0.3s;">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary);">本月结余</p>
                        <p class="text-2xl font-bold mt-1">¥4,260</p>
                    </div>
                    <i class="fas fa-balance-scale text-xl" style="color: var(--primary);"></i>
                </div>
                <div class="text-xs" style="color: var(--success);">+33.8%</div>
            </div>

            <div class="card p-6 rounded-xl fade-in" style="animation-delay: 0.4s;">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <p class="text-sm" style="color: var(--text-secondary);">总余额</p>
                        <p class="text-2xl font-bold mt-1">¥45,680</p>
                    </div>
                    <i class="fas fa-piggy-bank text-xl pulse-animation" style="color: var(--warning);"></i>
                </div>
                <div class="text-xs" style="color: var(--text-secondary);">累计储蓄</div>
            </div>
        </div>

        <!-- Charts and Transactions -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Chart Section -->
            <div class="lg:col-span-2">
                <div class="card p-6 rounded-xl slide-in">
                    <h2 class="text-xl font-semibold mb-4">支出分析</h2>
                    <div class="flex items-end justify-between h-64 mb-4">
                        <div class="flex-1 mx-1">
                            <div class="chart-bar bg-gradient-to-t from-blue-400 to-blue-300 rounded-t" style="height: 60%; background: linear-gradient(to top, var(--primary), var(--accent));"></div>
                            <p class="text-xs mt-2 text-center" style="color: var(--text-secondary);">餐饮</p>
                        </div>
                        <div class="flex-1 mx-1">
                            <div class="chart-bar bg-gradient-to-t from-green-400 to-green-300 rounded-t" style="height: 80%; background: linear-gradient(to top, var(--success), var(--success-light));"></div>
                            <p class="text-xs mt-2 text-center" style="color: var(--text-secondary);">购物</p>
                        </div>
                        <div class="flex-1 mx-1">
                            <div class="chart-bar bg-gradient-to-t from-yellow-400 to-yellow-300 rounded-t" style="height: 45%; background: linear-gradient(to top, var(--warning), var(--warning-light));"></div>
                            <p class="text-xs mt-2 text-center" style="color: var(--text-secondary);">交通</p>
                        </div>
                        <div class="flex-1 mx-1">
                            <div class="chart-bar bg-gradient-to-t from-red-400 to-red-300 rounded-t" style="height: 30%; background: linear-gradient(to top, var(--danger), var(--danger-light));"></div>
                            <p class="text-xs mt-2 text-center" style="color: var(--text-secondary);">娱乐</p>
                        </div>
                        <div class="flex-1 mx-1">
                            <div class="chart-bar bg-gradient-to-t from-purple-400 to-purple-300 rounded-t" style="height: 55%; background: linear-gradient(to top, var(--secondary), var(--secondary-light));"></div>
                            <p class="text-xs mt-2 text-center" style="color: var(--text-secondary);">其他</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Transactions -->
            <div class="card p-6 rounded-xl slide-in" style="animation-delay: 0.2s;">
                <h2 class="text-xl font-semibold mb-4">最近交易</h2>
                <div class="space-y-3 max-h-80 overflow-y-auto">
                    <div class="transaction-item flex justify-between items-center p-3 rounded-lg">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background-color: var(--success);">
                                <i class="fas fa-utensils text-white"></i>
                            </div>
                            <div>
                                <p class="font-medium">午餐</p>
                                <p class="text-xs" style="color: var(--text-secondary);">今天 12:30</p>
                            </div>
                        </div>
                        <span class="font-semibold" style="color: var(--danger);">-¥45</span>
                    </div>

                    <div class="transaction-item flex justify-between items-center p-3 rounded-lg">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background-color: var(--primary);">
                                <i class="fas fa-briefcase text-white"></i>
                            </div>
                            <div>
                                <p class="font-medium">工资</p>
                                <p class="text-xs" style="color: var(--text-secondary);">昨天 09:00</p>
                            </div>
                        </div>
                        <span class="font-semibold" style="color: var(--success);">+¥8,500</span>
                    </div>

                    <div class="transaction-item flex justify-between items-center p-3 rounded-lg">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background-color: var(--warning);">
                                <i class="fas fa-shopping-cart text-white"></i>
                            </div>
                            <div>
                                <p class="font-medium">超市购物</p>
                                <p class="text-xs" style="color: var(--text-secondary);">昨天 18:20</p>
                            </div>
                        </div>
                        <span class="font-semibold" style="color: var(--danger);">-¥238</span>
                    </div>

                    <div class="transaction-item flex justify-between items-center p-3 rounded-lg">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background-color: var(--accent);">
                                <i class="fas fa-bus text-white"></i>
                            </div>
                            <div>
                                <p class="font-medium">地铁</p>
                                <p class="text-xs" style="color: var(--text-secondary);">2天前 08:15</p>
                            </div>
                        </div>
                        <span class="font-semibold" style="color: var(--danger);">-¥6</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Add Transaction -->
    <div id="transactionModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="card p-8 rounded-2xl max-w-md w-full mx-4 transform transition-all">
            <h3 class="text-xl font-semibold mb-6">添加新记录</h3>
            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">类型</label>
                    <select class="w-full p-3 rounded-lg border" style="background-color: var(--bg-primary); border-color: var(--border); color: var(--text-primary);">
                        <option>支出</option>
                        <option>收入</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">金额</label>
                    <input type="number" placeholder="0.00" class="w-full p-3 rounded-lg border" style="background-color: var(--bg-primary); border-color: var(--border); color: var(--text-primary);">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">分类</label>
                    <select class="w-full p-3 rounded-lg border" style="background-color: var(--bg-primary); border-color: var(--border); color: var(--text-primary);">
                        <option>餐饮</option>
                        <option>购物</option>
                        <option>交通</option>
                        <option>娱乐</option>
                        <option>其他</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2" style="color: var(--text-secondary);">备注</label>
                    <input type="text" placeholder="添加备注..." class="w-full p-3 rounded-lg border" style="background-color: var(--bg-primary); border-color: var(--border); color: var(--text-primary);">
                </div>
                <div class="flex space-x-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-lg border" style="border-color: var(--border); color: var(--text-primary);">取消</button>
                    <button type="submit" class="flex-1 py-3 rounded-lg btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme === 'system' ? (systemPrefersDark ? 'dark' : 'light') : savedTheme;
            document.body.setAttribute('data-theme', theme);
        }

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // Modal Management
        const modal = document.getElementById('transactionModal');
        const addBtn = document.getElementById('addTransactionBtn');

        addBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
            modal.classList.add('fade-in');
        });

        function closeModal() {
            modal.style.display = 'none';
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Initialize
        initTheme();

        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (localStorage.getItem('theme') === 'system') {
                document.body.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });

        // Form submission
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            closeModal();
            // Add transaction logic here
        });
    </script>
</body>
</html>
